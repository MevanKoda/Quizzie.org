<html>
  <head>
    <title>Quizze.org</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <div class="wrapper">

      
      <div class="customize-section">
        <h1>Welcome to Quizee.org💙</h1>
        <h3>Customize Your Quiz✍🏻</h3>
        <form id="customize-form">
        <div>
          <label>Subject</label>
          <select id="subject-selection" name="category">
            <option>Science</option>
            <option>Engineering</option>
            <option>ICT</option>
            <option>History</option>
          </select>
        </div>

        <div>
            <label>Question Count</label>
            <input type="number" placeholder="Questions" id="question-count" name="question-count">
        </div>

        <div>
            <label>Time Duration</label>
            <input type="number" placeholder="mins" id="duration" name="duration">
        </div>
        <br>
        <div class="button-container">
        <button type="submit">Start Quiz</button>
        </div>
      </div>
      </form>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
