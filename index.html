<html>
  <head>
    <title>Quizze.org</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://kit.fontawesome.com/ec48d5b588.js" crossorigin="anonymous"></script>
    <script src="./js/darkmode.js"></script>

  </head>

  <body>
      <button class="toggle-btn" id="toggleBtn"><i class="fa-solid fa-sun" id="icon"></i></button>



    <div class="wrapper">

      
      <div class="customize-section">
        <h1>Welcome to Quizee.org💙</h1>
        <h3>Customize Your Quiz✍🏻</h3>
        <form id="customize-form">
        <div>
          <label>Subject</label>
          <select id="subject-selection" name="category">
            <option value="Science">Science 🔬</option>
            <option value="Engineering">Engineering 🚀</option>
            <option value="ICT">ICT 🧑🏻‍💻</option>
            <option value="History">History 👑</option>
            <option value="Mathematics">Mathematics 📏</option>
            <option value="Geography">Geography 🌍</option>
            <option value="Literature and Language">Literature & Language ✍🏻</option>
            <option value="General Knowledge">General Knowledge 🤷🏻</option>
            <option value="Economics and Business">Economics & Business 🪙</option>
          </select>
        </div>

        <div>
            <label>Question Count</label>
            <input type="number" placeholder="Questions" id="question-count" name="question-count" min="1" max="25">
        </div>

        <div>
            <label>Time Duration</label>
            <input type="number" placeholder="mins" id="duration" name="duration" min="1" max="30" >
        </div>
        <br>
        <div class="button-container">
        <button type="submit" class="submit-btn">Start Quiz</button>
        </div>
      </div>
      </form>
    </div>


    <audio src="/soundEffects/ErrorSound.mp3" id="errorSound"></audio>
    <script src="./js/app.js"></script>


    <script>
      const toggleBtn = document.getElementById('toggleBtn')
      const modeIcon = document.getElementById('icon')  

      
toggleBtn.addEventListener('click',()=>{
    document.documentElement.classList.toggle('dark')

    const isDark = document.documentElement.classList.contains('dark');
    localStorage.setItem('theme', isDark? 'dark':'light')
    modeIcon.className = isDark? 'fa-solid fa-moon':'fa-solid fa-sun';
})

    </script>
  </body>
</html>
