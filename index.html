<html>
  <head>
    <title>Quizze.org</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="wrapper">

      
      <div class="customize-section">
        <h1>Welcome to Quizee.org💙</h1>
        <h3>Customize Your Quiz✍🏻</h3>
        <form id="customize-form">
        <div>
          <label>Subject</label>
          <select id="subject-selection" name="category">
            <option value="Science">Science 🔬</option>
            <option value="Engineering">Engineering 🚀</option>
            <option value="ICT">ICT 🧑🏻‍💻</option>
            <option value="History">History 👑</option>
            <option value="Mathematics">Mathematics 📏</option>
            <option value="Geography">Geography 🌍</option>
            <option value="Literature & Language">Literature & Language ✍🏻</option>
            <option value="General Knowledge">General Knowledge 🤷🏻</option>
            <option value="Economics & Business">Economics & Business 🪙</option>
          </select>
        </div>

        <div>
            <label>Question Count</label>
            <input type="number" placeholder="Questions" id="question-count" name="question-count" min="1" max="25">
        </div>

        <div>
            <label>Time Duration</label>
            <input type="number" placeholder="mins" id="duration" name="duration" min="1" max="30" >
        </div>
        <br>
        <div class="button-container">
        <button type="submit" class="submit-btn">Start Quiz</button>
        </div>
      </div>
      </form>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
